<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="Protest Strike">
            Anonym Chat
        </header>

        <!-- Control Panel for username change -->
        <div class="control-panel">
            <span class="mr-1">Chat as:</span>
            <span class="my-name" id="my-name" title="Click to change your screen name">Guest</span>
            <form class="edit-name-form" id="edit-name-form">
                <div class="input-group">
                    <input type="text" name="theName" class="form-control form-control-sm" id="new-username-input" placeholder="Enter new name">
                    <div class="input-group-append">
                        <button type="submit" class="btn btn-sm btn-primary">Change</button>
                    </div>
                </div>
            </form>
        </div>

        <!-- Chat input field -->
        <input class="biginput" type="text" id="input-field" placeholder="Type here Enter with keyboard or button">
        <button class="bigbutton" id="add-button">ENTER</button>

        <!-- Users section -->
        <div class="users">
            <h2>Users</h2>
        </div>
        <ul class="sideuserlist" id="user-list"></ul>

        <!-- Username input and sign-in button -->
        <input class="sideinput" type="text" id="user-input" placeholder="Name">
        <button class="sidebutton" id="add-user-button">SignIn</button>

        <ul id="shopping-list">
            <!-- Chat messages will be added here -->
        </ul>
    </div>

    <script>
        // Variables
        const addUserButton = document.getElementById('add-user-button');
        const userInput = document.getElementById('user-input');
        const userList = document.getElementById('user-list');
        const inputField = document.getElementById('input-field');
        const addButton = document.getElementById('add-button');
        const editNameForm = document.getElementById('edit-name-form');
        const newUsernameInput = document.getElementById('new-username-input');
        const myNameSpan = document.getElementById('my-name');
        let currentUser = '';  // Store the current username

        // Function to add a user to the user list
        function addUserToList() {
            const username = userInput.value.trim();
            if (username !== '') {
                currentUser = username;  // Store the username for later use in the chat
                const newUser = document.createElement('li');
                newUser.textContent = username;
                userList.appendChild(newUser);
                userInput.value = '';  // Clear the input field
                userInput.style.display = 'none';  // Hide the username input
                addUserButton.style.display = 'none';  // Hide the SignIn button
                myNameSpan.textContent = username;  // Display the current username in the control panel
                alert('You are signed in as ' + username);  // Optionally alert the user
            } else {
                alert("Please enter a username");
            }
        }

        // Function to add chat messages with the current user's name
        function addChatMessage() {
            const message = inputField.value.trim();
            if (message !== '' && currentUser !== '') {
                const newMessage = document.createElement('li');
                newMessage.textContent = `${currentUser}: ${message}`;
                document.getElementById('shopping-list').appendChild(newMessage);  // Add the message to the chat list
                inputField.value = '';  // Clear input field
            } else if (currentUser === '') {
                alert("You must sign in before sending a message.");
            }
        }

        // Event listener for the 'Add User' button
        addUserButton.addEventListener('click', addUserToList);

        // Event listener for the 'Enter' key press in the user input field
        userInput.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                addUserToList();
            }
        });

        // Event listener for the 'Enter' key press in the chat message field
        inputField.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                addChatMessage();  // Call addChatMessage() when Enter is pressed
            }
        });

        // Event listener for the 'Add to Wall' button
        addButton.addEventListener('click', addChatMessage);

        // Event listener for username change
        editNameForm.addEventListener('submit', function(event) {
            event.preventDefault();  // Prevent form from submitting normally
            const newUsername = newUsernameInput.value.trim();
            if (newUsername !== '') {
                currentUser = newUsername;  // Update the current username
                myNameSpan.textContent = newUsername;  // Update the displayed name
                newUsernameInput.value = '';  // Clear the input field
                alert('Your username has been changed to ' + newUsername);  // Optionally alert
            } else {
                alert('Please enter a valid username');
            }
        });
    </script>
</body>
</html>

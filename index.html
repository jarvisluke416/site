    <body>
         <center><a href="https://jarvisluke416.github.io/site/" target="_blank"><header class="Protest Strike">Anonym<img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgauTmvBC7TaihcTSu_VCbh0E9TN1cx3xh8h9g3DCcOFCfCv0GSdFXYNPCmNjL5TRA0uDhs0jNfbvLxO5MqB6E1k8lPAnh-UO6gZsrWYCVSvEZMgxbGrhcOGUoo2ZjuoDymYEPUSRbIDmZNd-0Gq0lf2rhXIBuIv6v2KEubo-h-W4JkOf4qnNiw7Cr3/s1600/anarchy.png" height="40" width="50">us Graffiti Chat</header></a></center>  
        <div class="container">
            <ul id="shopping-list"></ul>
            <input type="text" id="input-field" placeholder="Add text here and press enter or push button">
            <button id="add-button">ENTER</button>

            <div>
                <input type="text" id="username" placeholder="Enter your name">
                <button id="listbutton" onclick="addUser()">Add to list</button>
                <h3>USERLIST-ONLINE</h3>
                <ol id="userList"></ol>
            </div>
        </div>

        <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js"></script>

        <script>
            // Firebase configuration
            const appSettings = {
                databaseURL: "https://realtime-database-65290-default-rtdb.firebaseio.com/"
            }
            const app = initializeApp(appSettings)
            const database = getDatabase(app)
            const shoppingListInDB = ref(database, "shoppingList")
            const usersInDB = ref(database, "users")

            const inputFieldEl = document.getElementById("input-field")
            const addButtonEl = document.getElementById("add-button")
            const shoppingListEl = document.getElementById("shopping-list")
            const userListEl = document.getElementById("userList")
            const usernameInput = document.getElementById("username")

            let currentUser = ""

            // Function to add a user to the list
            function addUser() {
                const username = usernameInput.value.trim()
                if (username && !currentUser) {
                    currentUser = username
                    push(usersInDB, username)  // Save the user to the database
                    usernameInput.value = ""  // Clear the username field
                }
            }

            // Function to add a post to the shopping list with the user's name
            function addItemToList() {
                const inputText = inputFieldEl.value.trim()
                if (inputText && currentUser) {
                    const newItem = {
                        text: inputText,
                        user: currentUser
                    }
                    push(shoppingListInDB, newItem)
                    inputFieldEl.value = ""  // Clear the input field after adding item
                }
            }

            // Event listeners
            addButtonEl.addEventListener("click", addItemToList)
            inputFieldEl.addEventListener("keydown", function(event) {
                if (event.key === 'Enter') {
                    addItemToList()
                }
            })

            // Listen for changes to the shopping list in Firebase
            onValue(shoppingListInDB, function(snapshot) {
                if (snapshot.exists()) {
                    const itemsArray = Object.entries(snapshot.val())
                    clearShoppingListEl()

                    itemsArray.forEach(([itemID, itemData]) => {
                        const newEl = document.createElement("li")
                        newEl.textContent = `${itemData.user}: ${itemData.text}`
                        shoppingListEl.append(newEl)
                    })
                } else {
                    shoppingListEl.innerHTML = "No items here...yet"
                }
            })

            // Listen for changes to the user list in Firebase
            onValue(usersInDB, function(snapshot) {
                if (snapshot.exists()) {
                    const usersArray = Object.entries(snapshot.val())
                    clearUserListEl()

                    usersArray.forEach(([userID, username]) => {
                        const newUserEl = document.createElement("li")
                        newUserEl.textContent = username
                        userListEl.append(newUserEl)
                    })
                }
            })

            // Helper functions to clear lists
            function clearShoppingListEl() {
                shoppingListEl.innerHTML = ""
            }

            function clearUserListEl() {
                userListEl.innerHTML = ""
            }
        </script>
    </body>
